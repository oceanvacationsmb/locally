<!DOCTYPE html>
<html>
<head>
  <title>Locally</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f4f4f4;
    }
    .header {
      background: black;
      color: white;
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }
    .btn {
      background: black;
      color: white;
      padding: 10px;
      text-align: center;
      border-radius: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="header">Locally</div>

<div class="card">
  <h3>Beach Chair</h3>
  <p>$25 • 3 left • 0.5 mi</p>
  <div class="btn">Reserve</div>
</div>

<div class="card">
  <h3>Cooler</h3>
  <p>$15 • 2 left • 1.2 mi</p>
  <div class="btn">Reserve</div>
</div>

</body>
</html>
